{% extends "dashboard/_dashboard_base.html" %}
{% block title %}Delete Message from {{ contact_message.name }} — Dashboard{% endblock %}

{% block dashboard_content %}
<h1 style="margin-top:0;">Delete message from "{{ contact_message.name }}"?</h1>
<p style="color:var(--pc-gray);">This can't be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, Delete</button>
  <a href="{% url 'dashboard:contact_message_list' %}" class="btn btn-outline">Cancel</a>
</form>
{% endblock %}
