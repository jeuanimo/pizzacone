{% extends "dashboard/_dashboard_base.html" %}
{% block title %}Delete {{ stop.name }} — Dashboard{% endblock %}

{% block dashboard_content %}
<h1 style="margin-top:0;">Remove "{{ stop.name }}" from the schedule?</h1>
<p style="color:var(--pc-gray);">{{ stop.date }} — this can't be undone.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, Remove</button>
  <a href="{% url 'dashboard:schedule_list' %}" class="btn btn-outline">Cancel</a>
</form>
{% endblock %}
