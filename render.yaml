services:
  - type: web
    name: pizzacone
    env: python
    plan: standard
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn pizzacone_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: False
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: pizzacone.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://pizzacone.onrender.com
      - key: SECRET_KEY
        value: "ytd15w@kk0&)-6528h59+c7$qu5ok-@25&_vn8zmtfiys13_wy"
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DATABASE_URL
        fromDatabase:
          name: pizzacone-db
          property: connectionString
    autoDeploy: true
    disk:
      name: media
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: pizzacone-db
    plan: basic-256mb
